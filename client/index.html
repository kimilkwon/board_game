<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐎 말달리자</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      color: #fff;
      user-select: none;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Menu ────────────────────────────────────────────── */
    #s-menu h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255,215,0,.6);
      letter-spacing: .18em;
      margin-bottom: 6px;
    }
    #s-menu .sub {
      color: #7a9cc0; font-size: .9rem; margin-bottom: 36px;
    }
    .menu-box {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 36px 44px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 300px;
      max-width: 400px;
      width: 90vw;
    }
    .name-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .name-input::placeholder { color: #6a8aaa; }
    .name-input:focus { border-color: #38bdf8; }
    .name-hint { font-size:.78rem; color:#5a7a9a; text-align:center; margin-top:-8px; }

    .menu-divider {
      display: flex; align-items: center; gap: 12px; color: #4a6a8a; font-size:.82rem;
    }
    .menu-divider::before, .menu-divider::after {
      content:''; flex:1; height:1px; background:rgba(255,255,255,.1);
    }

    .mbtn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s, filter .1s;
      letter-spacing: .04em;
    }
    .mbtn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.3); }
    .mbtn:active { transform: none; }
    .mbtn-online {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
    }
    .mbtn-local {
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.2);
      color: #e2e8f0;
    }
    .mbtn-local:hover { background: rgba(255,255,255,.16); }

    /* ── Wait ────────────────────────────────────────────── */
    #s-wait { gap: 20px; }
    .spinner {
      width: 60px; height: 60px;
      border: 4px solid rgba(255,255,255,.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #s-wait h2 { font-size: 1.4rem; color: #e2e8f0; }
    #s-wait .wait-sub { color: #7a9cc0; font-size: .9rem; }
    .btn-sm {
      padding: 10px 28px;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 9px;
      background: transparent;
      color: #aaa;
      font-size: .9rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-sm:hover { background: rgba(255,255,255,.08); color: #fff; }

    /* ── Game ────────────────────────────────────────────── */
    #s-game {
      padding: 14px 10px 30px;
      gap: 12px;
      justify-content: flex-start;
    }

    .online-header {
      background: rgba(14,165,233,.12);
      border: 1px solid rgba(14,165,233,.3);
      border-radius: 30px;
      padding: 7px 20px;
      font-size: .82rem;
      color: #7dd3fc;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .oh-sep { color: #4a7a9a; }

    .status {
      display: flex;
      align-items: center;
      gap: 18px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 50px;
      padding: 10px 22px;
    }
    .turn-info { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 700; }
    .chip {
      width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .chip.black { background: #111; border-color: #777; color: #bbb; }
    .chip.white { background: #eee; border-color: #aaa; color: #555; }
    .timer-wrap { display: flex; align-items: center; gap: 8px; }
    .timer-track { width: 90px; height: 7px; background: rgba(255,255,255,.15); border-radius: 4px; overflow: hidden; }
    .timer-fill { height: 100%; background: #38bdf8; border-radius: 4px; transition: width 1s linear, background .3s; }
    .timer-fill.red { background: #f87171; }
    .timer-num { font-size: 1.25rem; font-weight: 700; color: #38bdf8; min-width: 44px; transition: color .3s; }
    .timer-num.red { color: #f87171; animation: blink .5s ease infinite alternate; }
    @keyframes blink { to { opacity: .2; } }

    /* ── Board (fluid) ───────────────────────────────────── */
    /*
      Total board width = lbl(18px) + 11*cell + 12*gap(2px) + 2*pad(2px) + border(6px)
                        = 52px + 11*cell
      Available         = 100vw - 20px (screen padding)
      → cell = (100vw - 72px) / 11
    */
    :root {
      --cell: clamp(22px, calc((100vw - 72px) / 11), 46px);
      --lbl:  18px;
      --gap:  2px;
    }
    .board-outer {
      display: grid;
      grid-template-columns: var(--lbl) repeat(11, var(--cell));
      grid-template-rows:    var(--lbl) repeat(11, var(--cell));
      gap: var(--gap);
      background: #5c4422;
      padding: var(--gap);
      border: 3px solid #7a5c30;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .lbl {
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(8px, 2.5vw, 11px); font-weight: 700; color: #c8a060;
    }
    .cell {
      width: var(--cell); height: var(--cell);
      border-radius: clamp(2px, 0.6vw, 4px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: filter .12s;
    }
    .cell:hover { filter: brightness(1.2); }
    .cell.desert { background: #c89a48; }
    .cell.grass  { background: #4a9440; }
    .cell.oasis  {
      background: radial-gradient(circle, #3dbf8a 0%, #1c7d58 55%, #0e5e40 100%);
      box-shadow: inset 0 0 12px rgba(61,191,138,.45);
    }
    .cell.vs  { outline: 2px solid #22d3ee; outline-offset: -2px; animation: vp .85s ease-in-out infinite alternate; }
    .cell.vk  { outline: 2px solid #c084fc; outline-offset: -2px; animation: vp .85s ease-in-out infinite alternate; }
    .cell.sel { outline: 2px solid #f97316; outline-offset: -2px; }
    @keyframes vp { to { filter: brightness(1.3); } }
    .oasis-mark {
      position: absolute;
      font-size: calc(var(--cell) * 0.5);
      opacity: .65; pointer-events: none;
    }
    .cell.not-my-turn { cursor: default; }
    .piece {
      width: calc(var(--cell) * 0.8); height: calc(var(--cell) * 0.8);
      border-radius: 50%; border: clamp(2px, 0.5vw, 3px) solid;
      display: flex; align-items: center; justify-content: center;
      font-size: calc(var(--cell) * 0.43);
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.2);
      transition: transform .1s;
    }
    .cell:hover .piece, .cell.sel .piece { transform: scale(1.1); }
    .piece.black { background: radial-gradient(circle at 34% 34%, #666, #111); border-color: #888; color: #ccc; }
    .piece.white { background: radial-gradient(circle at 34% 34%, #fff, #ccc); border-color: #aaa; color: #666; }

    /* ── Legend + bottom bar ─────────────────────────────── */
    .bottom-bar { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .lg { display: flex; align-items: center; gap: 5px; font-size: .74rem; color: #9ab; }
    .lg-box { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .btn-back {
      padding: 7px 18px; border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
      background: transparent; color: #8aa; font-size: .82rem; cursor: pointer;
      transition: all .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.08); color: #fff; }

    /* ── Dialogs ─────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 80;
      backdrop-filter: blur(5px);
    }
    .dlg {
      background: linear-gradient(140deg, #1e2e4c, #2a1e4c);
      border: 2px solid #ffd700;
      border-radius: 18px;
      padding: 32px 44px;
      text-align: center;
      box-shadow: 0 0 48px rgba(255,215,0,.2), 0 24px 48px rgba(0,0,0,.5);
      max-width: 90vw;
    }
    .dlg h3 { font-size: 1.2rem; margin-bottom: 8px; }
    .dlg p  { color: #aac; margin-bottom: 22px; line-height: 1.6; font-size: .95rem; }
    .dlg p b { color: #fff; }
    .btn-row { display: flex; gap: 12px; justify-content: center; }
    .btn {
      padding: 10px 28px; border: none; border-radius: 9px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: transform .1s, box-shadow .1s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.3); }
    .btn:active { transform: none; }
    .btn-yes { background: #22c55e; color: #fff; }
    .btn-no  { background: #ef4444; color: #fff; }
    .btn-rst { background: linear-gradient(135deg, #ffd700, #f97316); color: #111; margin-top: 4px; }
    .win-dlg { animation: pop .42s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes pop { from { transform:scale(.4); opacity:0; } to { transform:scale(1); opacity:1; } }
    .win-dlg h2 { font-size: 2rem; color: #ffd700; text-shadow: 0 0 24px rgba(255,215,0,.7); margin-bottom: 10px; }

    @media (max-width: 480px) {
      .status { gap: 10px; padding: 8px 14px; }
      .timer-track { width: 64px; }
      .timer-num { font-size: 1rem; }
      .turn-info { font-size: .9rem; }
      .dlg { padding: 24px 18px; }
      #s-game { padding: 10px 6px 20px; }
    }
  </style>
</head>
<body>

<!-- ── Menu Screen ─────────────────────────────────────── -->
<div class="screen" id="s-menu">
  <h1>🐎 말달리자</h1>
  <p class="sub">오아시스에 먼저 도달하는 플레이어가 승리</p>
  <div class="menu-box">
    <input class="name-input" id="ni" type="text" placeholder="닉네임 입력" maxlength="14">
    <p class="name-hint">온라인 매칭 시 사용됩니다</p>
    <button class="mbtn mbtn-online" id="btn-online">🌐 온라인 매칭하기</button>
    <div class="menu-divider">또는</div>
    <button class="mbtn mbtn-local" id="btn-local">👥 같이하기 (같은 화면)</button>
  </div>
</div>

<!-- ── Wait Screen ─────────────────────────────────────── -->
<div class="screen" id="s-wait" style="display:none">
  <div class="spinner"></div>
  <h2>상대방을 찾는 중...</h2>
  <p class="wait-sub" id="wait-sub"></p>
  <button class="btn-sm" id="btn-cancel">취소</button>
</div>

<!-- ── Game Screen ─────────────────────────────────────── -->
<div class="screen" id="s-game" style="display:none">
  <div class="online-header" id="online-hdr" style="display:none"></div>

  <div class="status">
    <div class="turn-info">
      <div class="chip black" id="turn-chip">♞</div>
      <span id="turn-text">흑의 차례</span>
    </div>
    <div class="timer-wrap">
      <div class="timer-track"><div class="timer-fill" id="tfill" style="width:100%"></div></div>
      <div class="timer-num" id="tnum">1:00</div>
    </div>
  </div>

  <div class="board-outer" id="board"></div>

  <div class="bottom-bar">
    <div class="legend">
      <div class="lg"><div class="lg-box" style="background:#c89a48"></div>사막</div>
      <div class="lg"><div class="lg-box" style="background:#4a9440"></div>초원</div>
      <div class="lg"><div class="lg-box" style="background:#1c7d58"></div>오아시스</div>
      <div class="lg"><div class="lg-box" style="border:2px solid #22d3ee;background:rgba(34,211,238,.1)"></div>슬라이드</div>
      <div class="lg"><div class="lg-box" style="border:2px solid #c084fc;background:rgba(192,132,252,.1)"></div>L자</div>
    </div>
    <button class="btn-back" id="btn-back">← 메뉴</button>
  </div>
</div>

<!-- ── Win Dialog ─────────────────────────────────────── -->
<div class="overlay" id="d-win" style="display:none">
  <div class="dlg win-dlg">
    <h2 id="win-title"></h2>
    <p id="win-desc">오아시스에 먼저 도달했습니다! 🌴</p>
    <button class="btn btn-rst" id="btn-rst">← 메뉴로</button>
  </div>
</div>

<script>
  // ── Constants ──────────────────────────────────────────
  const ALPHA = 'abcdefghijk';
  const GRASS = new Set(['3,5','4,4','4,5','4,6','5,3','5,4','5,6','5,7','6,4','6,5','6,6','7,5']);
  const BLACK_START = [[0,0],[0,1],[0,2],[1,0],[2,0],[8,10],[9,10],[10,8],[10,9],[10,10]];
  const WHITE_START = [[8,0],[9,0],[10,0],[10,1],[10,2],[0,8],[0,9],[0,10],[1,10],[2,10]];

  // ── Shared state ───────────────────────────────────────
  let mode = null;      // 'local' | 'online'
  let sock = null;
  let myColor = null;
  let roomId = null;
  let oppName = '';

  let grid, turn, done;
  let sel, vS, vK;
  let tLeft, tId;

  // ── Screen management ──────────────────────────────────
  function show(id) {
    ['s-menu','s-wait','s-game'].forEach(s =>
      document.getElementById(s).style.display = (s === id) ? 'flex' : 'none'
    );
  }

  // ── Cell type ──────────────────────────────────────────
  function ctype(c, r) {
    if (c===5 && r===5) return 'oasis';
    if (GRASS.has(`${c},${r}`)) return 'grass';
    return 'desert';
  }

  // ── Move generation ────────────────────────────────────
  function getSlides(c, r) {
    const out = [];
    for (const [dc,dr] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      let nc=c+dc, nr=r+dr, lc=null, lr=null;
      while (nc>=0&&nc<11&&nr>=0&&nr<11&&!grid[nc][nr]) {
        lc=nc; lr=nr; nc+=dc; nr+=dr;
      }
      if (lc !== null) out.push([lc, lr]);
    }
    return out;
  }

  function getKnights(c, r) {
    return [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]
      .map(([dc,dr]) => [c+dc,r+dr])
      .filter(([nc,nr]) =>
        nc>=0&&nc<11&&nr>=0&&nr<11&&!grid[nc][nr]&&ctype(nc,nr)==='desert'
      );
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    const sSet = new Set(vS.map(([a,b])=>`${a},${b}`));
    const kSet = new Set(vK.map(([a,b])=>`${a},${b}`));
    const selKey = sel ? `${sel[0]},${sel[1]}` : null;
    const myTurn = (mode === 'online') ? (myColor === turn) : true;

    // Corner + col labels
    el.appendChild(mkLbl(''));
    for (let c=0; c<11; c++) el.appendChild(mkLbl(ALPHA[c]));

    for (let r=0; r<11; r++) {
      el.appendChild(mkLbl(r+1));
      for (let c=0; c<11; c++) {
        const key = `${c},${r}`;
        const type = ctype(c, r);
        const cell = document.createElement('div');
        cell.className = 'cell ' + type;
        if (!myTurn) cell.classList.add('not-my-turn');
        if      (key === selKey)  cell.classList.add('sel');
        else if (sSet.has(key))   cell.classList.add('vs');
        else if (kSet.has(key))   cell.classList.add('vk');
        if (type==='oasis' && !grid[c][r]) {
          const m = document.createElement('div');
          m.className = 'oasis-mark'; m.textContent = '🌴';
          cell.appendChild(m);
        }
        if (grid[c][r]) {
          const p = document.createElement('div');
          p.className = 'piece ' + grid[c][r];
          p.textContent = grid[c][r]==='black' ? '♞' : '♘';
          cell.appendChild(p);
        }
        cell.addEventListener('click', () => onCell(c, r));
        el.appendChild(cell);
      }
    }
  }

  function mkLbl(t) {
    const d = document.createElement('div');
    d.className = 'lbl'; d.textContent = t; return d;
  }

  // ── Status ─────────────────────────────────────────────
  function updateStatus() {
    const chip = document.getElementById('turn-chip');
    const txt  = document.getElementById('turn-text');
    chip.className = 'chip ' + turn;
    chip.textContent = turn==='black' ? '♞' : '♘';
    if (mode === 'online') {
      const isMyTurn = myColor === turn;
      txt.textContent = isMyTurn ? '내 차례' : '상대 차례...';
    } else {
      txt.textContent = (turn==='black'?'흑':'백') + '의 차례';
    }
  }

  function drawTimer() {
    const num  = document.getElementById('tnum');
    const fill = document.getElementById('tfill');
    const m = Math.floor(tLeft/60), s = tLeft%60;
    num.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    const urgent = tLeft <= 10;
    num.classList.toggle('red', urgent);
    fill.classList.toggle('red', urgent);
    fill.style.width = (tLeft/60*100) + '%';
  }

  function updateOnlineHeader() {
    const hdr = document.getElementById('online-hdr');
    if (mode !== 'online') { hdr.style.display='none'; return; }
    const myLabel = myColor==='black'?'흑(♞)':'백(♘)';
    const oppColor = myColor==='black'?'백(♘)':'흑(♞)';
    hdr.style.display = 'flex';
    hdr.innerHTML = `🌐 온라인 매치
      <span class="oh-sep">|</span>
      나: <b style="color:#fff">${document.getElementById('ni').value.trim()||'플레이어'} ${myLabel}</b>
      <span class="oh-sep">vs</span>
      상대: <b style="color:#fff">${oppName} ${oppColor}</b>`;
  }

  function showWin(title, desc) {
    document.getElementById('win-title').textContent = title;
    document.getElementById('win-desc').textContent = desc || '오아시스에 먼저 도달했습니다! 🌴';
    document.getElementById('d-win').style.display = 'flex';
  }

  // ── Interaction ────────────────────────────────────────
  function onCell(c, r) {
    if (done) return;
    if (mode==='online' && myColor !== turn) return;

    const key = `${c},${r}`;
    const sSet = new Set(vS.map(([a,b])=>`${a},${b}`));
    const kSet = new Set(vK.map(([a,b])=>`${a},${b}`));

    if (sSet.has(key) || kSet.has(key)) {
      const [fc,fr] = sel, [tc,tr] = [c,r];
      const mover = grid[fc][fr];
      if (mode === 'online') {
        sock.emit('move', {roomId, fc, fr, tc, tr});
        sel=null; vS=[]; vK=[]; render();
      } else {
        grid[tc][tr]=mover; grid[fc][fr]=null;
        sel=null; vS=[]; vK=[];
        if (tc===5 && tr===5) {
          done=true; clearInterval(tId);
          render();
          setTimeout(()=>showWin(`${mover==='black'?'흑(♞)':'백(♘)'} 승리! 🎉`), 300);
          return;
        }
        turn=turn==='black'?'white':'black';
        render(); updateStatus(); startLocalTimer();
      }
      return;
    }

    if (grid[c][r] === turn) {
      sel=[c,r]; vS=getSlides(c,r); vK=getKnights(c,r);
      render(); return;
    }

    sel=null; vS=[]; vK=[]; render();
  }

  // ── Local timer ────────────────────────────────────────
  function startLocalTimer() {
    clearInterval(tId); tLeft=60;
    tId = setInterval(()=>{
      if(done){clearInterval(tId);return;}
      tLeft--;
      drawTimer();
      if(tLeft<=0){
        sel=null; vS=[]; vK=[];
        turn=turn==='black'?'white':'black';
        render(); updateStatus(); startLocalTimer();
      }
    },1000);
    drawTimer();
  }

  // ── Game init ──────────────────────────────────────────
  function initGame() {
    grid=Array.from({length:11},()=>Array(11).fill(null));
    for(const[c,r] of BLACK_START) grid[c][r]='black';
    for(const[c,r] of WHITE_START) grid[c][r]='white';
    turn='black'; done=false;
    sel=null; vS=[]; vK=[];
    updateStatus(); render();
  }

  // ── Apply server state (online) ───────────────────────
  function applyState(state) {
    grid=state.grid; turn=state.turn; done=state.done; tLeft=state.timeLeft;
    sel=null; vS=[]; vK=[];
    updateStatus(); render(); drawTimer();
  }

  // ── Online socket ──────────────────────────────────────
  function setupSock() {
    sock.off('waiting').off('matched').off('state').off('tick').off('winner').off('opp_left');

    sock.on('waiting', () => show('s-wait'));

    sock.on('matched', ({roomId:rid, myColor:mc, oppName:on, state}) => {
      roomId=rid; myColor=mc; oppName=on;
      applyState(state);
      show('s-game');
      updateOnlineHeader();
    });

    sock.on('state', state => {
      applyState(state);
    });

    sock.on('tick', tl => { tLeft=tl; drawTimer(); });

    sock.on('winner', ({color, name}) => {
      done=true;
      const isMe = color===myColor;
      showWin(
        isMe ? '🎉 내가 승리!' : `${name} 승리!`,
        isMe ? '오아시스에 먼저 도달했습니다! 🌴' : '상대방이 오아시스에 도달했습니다.'
      );
    });

    sock.on('opp_left', () => {
      done=true;
      showWin('🎉 내가 승리!', '상대방이 연결을 끊었습니다.');
    });
  }

  // ── Menu buttons ───────────────────────────────────────
  document.getElementById('btn-online').addEventListener('click', ()=>{
    const name = document.getElementById('ni').value.trim() || '플레이어';
    mode='online'; myColor=null; roomId=null;
    document.getElementById('wait-sub').textContent=`닉네임: ${name}`;
    show('s-wait');
    if(!sock) sock=io();
    setupSock();
    sock.emit('join',{name});
  });

  document.getElementById('btn-local').addEventListener('click', ()=>{
    mode='local'; myColor=null;
    document.getElementById('online-hdr').style.display='none';
    initGame();
    show('s-game');
    startLocalTimer();
  });

  document.getElementById('btn-cancel').addEventListener('click', ()=>{
    if(sock) sock.emit('cancel');
    show('s-menu');
  });

  document.getElementById('btn-back').addEventListener('click', ()=>{
    clearInterval(tId);
    if(mode==='online' && sock) sock.emit('cancel');
    document.getElementById('d-win').style.display='none';
    show('s-menu');
  });

  document.getElementById('btn-rst').addEventListener('click', ()=>{
    document.getElementById('d-win').style.display='none';
    clearInterval(tId);
    show('s-menu');
  });
</script>
</body>
</html>
