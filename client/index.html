<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 보드게임 플랫폼</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{overflow-x:hidden;height:100%;}
    body{
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      min-height:100vh;
      font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
      color:#fff;user-select:none;
    }
    .screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

    /* ── GAME SELECT ─────────────────────────────────────── */
    #s-select h1{font-size:clamp(1.8rem,5vw,3rem);color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.6);letter-spacing:.1em;margin-bottom:6px;text-align:center;}
    #s-select .sub{color:#7a9cc0;font-size:.9rem;margin-bottom:48px;text-align:center;}
    .game-cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:700px;}
    .game-card{
      background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.14);
      border-radius:20px;padding:36px 32px;cursor:pointer;width:220px;text-align:center;
      transition:transform .2s,box-shadow .2s,border-color .2s;
    }
    .game-card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.4);border-color:rgba(255,255,255,.3);}
    .game-card .gc-icon{font-size:3.5rem;margin-bottom:14px;display:block;}
    .game-card .gc-name{font-size:1.3rem;font-weight:700;margin-bottom:8px;color:#f0f0f0;}
    .game-card .gc-desc{font-size:.8rem;color:#7a9cc0;line-height:1.5;}
    .game-card.bang-card{border-color:rgba(239,68,68,.35);}
    .game-card.bang-card:hover{border-color:rgba(239,68,68,.7);box-shadow:0 16px 40px rgba(239,68,68,.2);}
    .game-card.horse-card{border-color:rgba(59,130,246,.35);}
    .game-card.horse-card:hover{border-color:rgba(59,130,246,.7);box-shadow:0 16px 40px rgba(59,130,246,.2);}

    /* ── SHARED ─────────────────────────────────────────── */
    .name-input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:1rem;outline:none;transition:border-color .2s;}
    .name-input::placeholder{color:#6a8aaa;}
    .name-input:focus{border-color:#38bdf8;}
    .mbtn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .1s;letter-spacing:.04em;}
    .mbtn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3);}
    .mbtn:active{transform:none;}
    .mbtn-primary{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;}
    .mbtn-red{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;}
    .mbtn-ghost{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#e2e8f0;}
    .mbtn-ghost:hover{background:rgba(255,255,255,.16);}
    .btn-back{background:none;border:1.5px solid rgba(255,255,255,.2);color:#aaa;border-radius:9px;padding:9px 22px;cursor:pointer;font-size:.88rem;transition:all .15s;}
    .btn-back:hover{background:rgba(255,255,255,.08);color:#fff;}
    .menu-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:36px 44px;display:flex;flex-direction:column;gap:16px;min-width:300px;max-width:400px;width:90vw;}
    .menu-divider{display:flex;align-items:center;gap:12px;color:#4a6a8a;font-size:.82rem;}
    .menu-divider::before,.menu-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}

    /* ── 말달리자 MENU / WAIT ─────────────────────────────── */
    #s-menu h1{font-size:clamp(2rem,6vw,3.2rem);color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.6);letter-spacing:.18em;margin-bottom:6px;}
    #s-menu .sub{color:#7a9cc0;font-size:.9rem;margin-bottom:36px;}
    .mbtn-online{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;}
    .mbtn-local{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#e2e8f0;}
    .mbtn-local:hover{background:rgba(255,255,255,.16);}
    #s-wait{gap:20px;}
    .spinner{width:60px;height:60px;border:4px solid rgba(255,255,255,.15);border-top-color:#38bdf8;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #s-wait h2{font-size:1.4rem;color:#e2e8f0;}
    .wait-sub{color:#7a9cc0;font-size:.9rem;}
    .btn-sm{padding:10px 28px;border:1.5px solid rgba(255,255,255,.25);border-radius:9px;background:transparent;color:#aaa;font-size:.9rem;cursor:pointer;transition:all .15s;}
    .btn-sm:hover{background:rgba(255,255,255,.08);color:#fff;}

    /* ── 말달리자 GAME ────────────────────────────────────── */
    #s-game{padding:14px 10px 30px;gap:12px;justify-content:flex-start;}
    .online-header{background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.3);border-radius:30px;padding:7px 20px;font-size:.82rem;color:#7dd3fc;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .timer-bar{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:6px 16px;font-size:.82rem;color:#94a3b8;display:flex;align-items:center;gap:8px;}
    #timer-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,#22c55e,#eab308);transition:width .9s linear,background .3s;}
    #timer-wrap{flex:1;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;height:6px;}
    .status-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
    .badge{padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700;}
    .badge-you{background:rgba(14,165,233,.25);color:#7dd3fc;border:1px solid rgba(14,165,233,.4);}
    .badge-opp{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.35);}
    .badge-turn{background:rgba(234,179,8,.2);color:#fde047;border:1px solid rgba(234,179,8,.35);}
    #board-wrap{overflow:auto;max-width:100%;border-radius:16px;}
    #board{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;min-width:340px;}
    .lbl{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:#5a7a9a;font-weight:600;}
    .cell{width:28px;height:28px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;border:1.5px solid transparent;position:relative;}
    .cell-desert{background:rgba(194,154,108,.18);}
    .cell-grass{background:rgba(34,197,94,.14);}
    .cell-oasis{background:radial-gradient(circle,rgba(56,189,248,.35),rgba(14,165,233,.1));border:1.5px solid rgba(56,189,248,.5)!important;}
    .cell:hover:not(.cell-empty-hover){filter:brightness(1.3);}
    .cell-selected{border-color:#ffd700!important;box-shadow:0 0 8px rgba(255,215,0,.5);}
    .cell-move{background:rgba(56,189,248,.3)!important;border-color:#38bdf8!important;}
    .cell-jump{background:rgba(168,85,247,.3)!important;border-color:#a855f7!important;}
    .piece-b{filter:drop-shadow(0 1px 3px rgba(0,0,0,.8));}
    .piece-w{filter:drop-shadow(0 1px 3px rgba(0,0,0,.8));}
    #win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
    #win-overlay h2{font-size:2.2rem;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.6);}
    #win-overlay p{color:#cbd5e1;font-size:1rem;}
    #win-overlay button{padding:14px 44px;background:linear-gradient(135deg,#ffd700,#f97316);border:none;border-radius:12px;color:#111;font-size:1rem;font-weight:700;cursor:pointer;}

    /* ── BANG! LOBBY ─────────────────────────────────────── */
    #s-bang-lobby{gap:24px;}
    #s-bang-lobby h2{font-size:1.8rem;color:#ffd700;text-align:center;}
    .lobby-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:24px;width:min(440px,90vw);}
    .lobby-players{display:flex;flex-direction:column;gap:8px;min-height:80px;margin-bottom:16px;}
    .lobby-player{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.07);border-radius:8px;font-size:.9rem;}
    .lobby-player .lp-num{color:#7a9cc0;font-size:.78rem;width:18px;}
    .lobby-player .lp-host{font-size:.7rem;background:rgba(234,179,8,.25);color:#fde047;border-radius:4px;padding:1px 6px;margin-left:auto;}
    .lobby-count{text-align:center;color:#7a9cc0;font-size:.85rem;margin-bottom:12px;}

    /* ── BANG! GAME ──────────────────────────────────────── */
    #s-bang-game{
      padding:8px;gap:8px;justify-content:flex-start;align-items:stretch;
      min-height:100vh;max-width:1200px;margin:0 auto;
    }
    /* Top bar */
    .bg-topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:4px 0;}
    .bg-phase-badge{padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700;background:rgba(234,179,8,.2);color:#fde047;border:1px solid rgba(234,179,8,.35);}

    /* Players area */
    .bg-players{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    .bg-player{
      background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);
      border-radius:12px;padding:10px 12px;min-width:130px;max-width:170px;flex:1;
      transition:border-color .2s,box-shadow .2s;
      cursor:default;
    }
    .bg-player.is-turn{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.3);}
    .bg-player.is-dead{opacity:.4;border-color:rgba(255,255,255,.06);}
    .bg-player.is-me{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.06);}
    .bg-player.pending-action{border-color:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.5);animation:pulse-red .8s infinite alternate;}
    .bg-player.is-target{border-color:#f97316;cursor:pointer;}
    .bg-player.is-target:hover{box-shadow:0 0 12px rgba(249,115,22,.5);}
    @keyframes pulse-red{from{box-shadow:0 0 8px rgba(239,68,68,.3);}to{box-shadow:0 0 18px rgba(239,68,68,.7);}}
    .bg-player .pname{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bg-player .prole{font-size:.7rem;padding:1px 7px;border-radius:4px;display:inline-block;margin-top:3px;font-weight:600;}
    .role-sheriff{background:rgba(234,179,8,.3);color:#fde047;}
    .role-deputy{background:rgba(59,130,246,.3);color:#93c5fd;}
    .role-outlaw{background:rgba(239,68,68,.3);color:#fca5a5;}
    .role-renegade{background:rgba(168,85,247,.3);color:#d8b4fe;}
    .role-hidden{background:rgba(255,255,255,.1);color:#9ca3af;}
    .bg-player .php{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px;}
    .hp-heart{font-size:.85rem;}
    .hp-empty{font-size:.85rem;opacity:.25;}
    .bg-player .pequip{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
    .equip-tag{font-size:.65rem;padding:1px 5px;border-radius:4px;background:rgba(59,130,246,.25);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}
    .bg-player .phand-count{font-size:.75rem;color:#7a9cc0;margin-top:4px;}

    /* Middle area */
    .bg-middle{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;}
    /* Deck + Discard */
    .bg-deck-area{display:flex;gap:12px;align-items:center;flex-shrink:0;}
    .bg-deck{width:62px;height:88px;border-radius:8px;background:linear-gradient(135deg,#1e3a5f,#0f2d4e);border:2px solid rgba(59,130,246,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.7rem;color:#93c5fd;gap:4px;}
    .bg-discard{width:62px;height:88px;border-radius:8px;border:2px solid rgba(255,255,255,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.6rem;color:#9ca3af;gap:3px;overflow:hidden;}

    /* Game log */
    .bg-log{flex:1;min-width:200px;max-height:160px;overflow-y:auto;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;font-size:.75rem;color:#9ca3af;line-height:1.6;}
    .bg-log p{border-bottom:1px solid rgba(255,255,255,.05);padding-bottom:2px;margin-bottom:2px;}
    .bg-log p:last-child{border:none;}

    /* Pending action banner */
    .bg-pending{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:10px 16px;text-align:center;font-size:.88rem;color:#fca5a5;}

    /* My hand */
    .bg-hand-area{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;}
    .bg-hand-title{font-size:.8rem;color:#7a9cc0;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
    .bg-hand-cards{display:flex;gap:8px;flex-wrap:wrap;}

    /* ── Cards ───────────────────────────────────────────── */
    .bg-card{
      width:84px;height:120px;border-radius:10px;
      border:2px solid rgba(255,255,255,.18);
      display:flex;flex-direction:column;justify-content:space-between;
      cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;
      padding:5px;position:relative;overflow:hidden;
      box-shadow:2px 4px 14px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1);
      background:#1a1a2e;
    }
    .card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px;display:block;}
    .card-overlay{position:absolute;bottom:0;left:0;right:0;height:36px;border-radius:0 0 8px 8px;
      background:linear-gradient(transparent,rgba(0,0,0,.82));pointer-events:none;}
    .card-shine{position:absolute;top:0;left:0;right:0;height:38%;border-radius:8px 8px 0 0;pointer-events:none;
      background:linear-gradient(180deg,rgba(255,255,255,.13) 0%,transparent 100%);}
    .bg-card:hover{transform:translateY(-9px);box-shadow:2px 14px 30px rgba(0,0,0,.8);}
    .bg-card.selected{border-color:#ffd700!important;box-shadow:0 0 22px rgba(255,215,0,.7);transform:translateY(-11px);}
    .bg-card.disabled{opacity:.38;cursor:not-allowed;}
    .bg-card.disabled:hover{transform:none;box-shadow:2px 4px 14px rgba(0,0,0,.6);}
    .card-corner{display:flex;flex-direction:column;align-items:center;line-height:1;z-index:2;position:relative;
      background:rgba(0,0,0,.55);border-radius:4px;padding:1px 3px;}
    .card-tl{align-self:flex-start;}
    .card-br{align-self:flex-end;transform:rotate(180deg);}
    .card-corner .cv{font-size:.65rem;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);}
    .card-corner .cs{font-size:.58rem;color:#fff;opacity:.9;}
    .card-foot{position:absolute;bottom:4px;left:0;right:0;text-align:center;z-index:2;
      font-size:.5rem;font-weight:900;color:#fff;text-shadow:0 1px 4px #000;letter-spacing:.04em;word-break:keep-all;}
    /* Fallback (no image) */
    .card-fallback{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:4px;border-radius:8px;}
    .card-fallback .fi{font-size:1.8rem;filter:drop-shadow(0 2px 5px rgba(0,0,0,.6));}
    .card-fallback .fn{font-size:.52rem;font-weight:900;text-align:center;
      text-shadow:0 1px 4px rgba(0,0,0,.8);padding:0 4px;}
    /* Border tint per type + fallback gradient */
    .ct-bang{border-color:#ef4444;} .ct-bang .card-fallback{background:linear-gradient(155deg,#6b0000,#b91c1c);}
    .ct-missed{border-color:#94a3b8;} .ct-missed .card-fallback{background:linear-gradient(155deg,#1a1f2e,#3d4a60);}
    .ct-beer{border-color:#d97706;} .ct-beer .card-fallback{background:linear-gradient(155deg,#3d1a00,#a16207);}
    .ct-draw{border-color:#f59e0b;} .ct-draw .card-fallback{background:linear-gradient(155deg,#2d1a00,#9a5a00);}
    .ct-area{border-color:#fb923c;} .ct-area .card-fallback{background:linear-gradient(155deg,#3a0e00,#9a3412);}
    .ct-duel{border-color:#c084fc;} .ct-duel .card-fallback{background:linear-gradient(155deg,#2d0050,#6b21a8);}
    .ct-saloon{border-color:#2dd4bf;} .ct-saloon .card-fallback{background:linear-gradient(155deg,#00201f,#0f766e);}
    .ct-equip{border-color:#60a5fa;} .ct-equip .card-fallback{background:linear-gradient(155deg,#07153a,#1e40af);}
    .ct-weapon{border-color:#818cf8;} .ct-weapon .card-fallback{background:linear-gradient(155deg,#08080f,#1e1e3f);}

    /* Action buttons */
    .bg-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .bg-btn{padding:9px 18px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;}
    .bg-btn:hover{filter:brightness(1.15);}
    .bg-btn-end{background:rgba(234,179,8,.25);color:#fde047;border:1px solid rgba(234,179,8,.4);}
    .bg-btn-pass{background:rgba(107,114,128,.25);color:#d1d5db;border:1px solid rgba(107,114,128,.35);}
    .bg-btn-damage{background:rgba(239,68,68,.25);color:#fca5a5;border:1px solid rgba(239,68,68,.4);}
    .bg-err{color:#fca5a5;font-size:.8rem;}

    /* Role reveal overlay */
    .bg-role-reveal{
      position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    }
    .role-card-big{background:rgba(255,255,255,.1);border:2px solid rgba(255,215,0,.5);border-radius:20px;padding:40px 60px;text-align:center;}
    .role-card-big .ricon{font-size:4rem;margin-bottom:12px;}
    .role-card-big .rname{font-size:2rem;font-weight:700;color:#ffd700;}
    .role-card-big .rdesc{color:#9ca3af;font-size:.95rem;margin-top:8px;max-width:260px;line-height:1.5;}

    /* Game over overlay */
    #bg-gameover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
    #bg-gameover h2{font-size:2.5rem;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.5);}

    /* Scrollbar */
    .bg-log::-webkit-scrollbar{width:4px;}
    .bg-log::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px;}

    @media(max-width:600px){
      .bg-card{width:60px;height:88px;}
      .bg-player{min-width:110px;padding:8px;}
      .bg-middle{flex-direction:column;}
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     SCREEN: 게임 선택
════════════════════════════════════════════════════════ -->
<div class="screen" id="s-select">
  <h1>🎮 보드게임 플랫폼</h1>
  <p class="sub">플레이할 게임을 선택하세요</p>
  <div class="game-cards">
    <div class="game-card horse-card" onclick="selectGame('horse')">
      <span class="gc-icon">🐎</span>
      <div class="gc-name">말달리자</div>
      <div class="gc-desc">1vs1 전략 보드게임<br>오아시스를 먼저 점령하라!</div>
    </div>
    <div class="game-card bang-card" onclick="selectGame('bang')">
      <span class="gc-icon">🤠</span>
      <div class="gc-name">뱅! (Bang!)</div>
      <div class="gc-desc">4~8인 역할 숨기기 카드게임<br>보안관을 지켜라 / 처치하라!</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     SCREEN: 말달리자 메뉴
════════════════════════════════════════════════════════ -->
<div class="screen" id="s-menu" style="display:none">
  <h1>🐎 말달리자</h1>
  <p class="sub">오아시스를 먼저 점령하는 자가 승리</p>
  <div class="menu-box">
    <input class="name-input" id="name-input" placeholder="닉네임 입력" maxlength="14">
    <button class="mbtn mbtn-online" onclick="goOnline()">🌐 온라인 대전</button>
    <div class="menu-divider">또는</div>
    <button class="mbtn mbtn-local mbtn-ghost" onclick="goLocal()">👥 로컬 대전 (같은 기기)</button>

</div>

<div class="screen" id="s-wait" style="display:none">

     SCREEN: 말달리자 게임판
════════════════════════════════════════════════════════ -->
<div class="screen" id="s-game" style="display:none">

<div class="screen" id="s-bang-lobby" style="display:none">
  <h2>🤠 뱅! 로비</h2>
  <div class="lobby-box">
    <input class="name-input" id="bang-name-input" placeholder="닉네임 입력" maxlength="14" style="margin-bottom:4px;">
    <button class="mbtn mbtn-red" onclick="bangJoin()" style="margin-bottom:16px;">로비 입장</button>
    <div class="lobby-players" id="bang-lobby-players">
      <div style="color:#4a6a8a;font-size:.85rem;text-align:center;padding:20px 0;">로비에 입장하면 다른 플레이어가 보입니다</div>
    </div>

    <button class="mbtn mbtn-red" id="bang-start-btn" onclick="bangHostStart()" style="display:none;">🎮 게임 시작 (최소 4명)</button>

     SCREEN: 뱅! 게임
════════════════════════════════════════════════════════ -->
<div id="s-bang-game" style="display:none;padding:10px;max-width:1100px;margin:0 auto;">

  <!-- Top bar -->
  <div class="bg-topbar">
    <span style="font-size:1.1rem;font-weight:700;">🤠 뱅!</span>

  </div>

  <!-- Players -->
  <div class="bg-players" id="bg-players"></div>

  <!-- Middle: deck/discard + log -->
  <div class="bg-middle">
    <div class="bg-deck-area">
      <div class="bg-deck" id="bg-deck">
        <span style="font-size:1.5rem">🂠</span>
        <span id="bg-deck-count">—</span>
        <span>덱</span>
      </div>
      <div class="bg-discard" id="bg-discard">
        <span style="font-size:1.4rem">🃟</span>
        <span style="font-size:.6rem;color:#6b7280">버린 카드</span>
      </div>
    </div>
    <div class="bg-log" id="bg-log"></div>
  </div>

  <!-- Pending action banner -->
  <div class="bg-pending" id="bg-pending" style="display:none"></div>

  <div class="bg-hand-area">

      <span>🃏 내 패</span>

    </div>

  <!-- Action buttons -->
  <div class="bg-actions">
    <button class="bg-btn bg-btn-end" id="bg-end-turn-btn" onclick="bangEndTurn()" style="display:none;">턴 종료</button>
    <button class="bg-btn bg-btn-pass" id="bg-pass-btn" onclick="bangRespond(null)" style="display:none;">😵 피해 입기</button>
    <button class="bg-btn bg-btn-damage" id="bg-take-dmg-btn" onclick="bangRespond(null)" style="display:none;">😵 피해 입기</button>
    <button class="bg-btn bg-btn-pass" id="bg-duel-pass-btn" onclick="bangRespond(null)" style="display:none;">🏳 항복 (-1HP)</button>
  </div>

<!-- Role reveal overlay -->
<div class="bg-role-reveal" id="bg-role-reveal" style="display:none">
  <div class="role-card-big">
    <div class="ricon" id="reveal-icon"></div>
    <div class="rname" id="reveal-name"></div>
    <div class="rdesc" id="reveal-desc"></div>
  </div>
  <button class="mbtn mbtn-primary" style="max-width:200px;" onclick="document.getElementById('bg-role-reveal').style.display='none'">확인</button>
</div>

<!-- Game over overlay -->
<div id="bg-gameover" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:18px;">
  <div style="font-size:3.5rem" id="bg-go-icon">🏆</div>
  <h2 id="bg-go-title" style="font-size:2rem;color:#ffd700;text-align:center;"></h2>
  <div id="bg-go-roles" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:500px;"></div>
  <button class="mbtn mbtn-primary" style="max-width:200px;margin-top:8px;" onclick="location.reload()">메뉴로 돌아가기</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
const socket = io();

function show(id) {
  ['s-select','s-menu','s-wait','s-game','s-bang-lobby','s-bang-game']
    .forEach(s => document.getElementById(s).style.display = s===id?'flex':'none');
  if(id==='s-bang-game') document.getElementById('s-bang-game').style.display='block';
}

function selectGame(game) {
  if(game==='horse') show('s-menu');
  else if(game==='bang') show('s-bang-lobby');
}

// ═══════════════════════════════════════════════════════════
// 말달리자
// ═══════════════════════════════════════════════════════════
const GRASS = new Set(['3,5','4,4','4,5','4,6','5,3','5,4','5,6','5,7','6,4','6,5','6,6','7,5']);
const ALPHA = 'ABCDEFGHIJK';
let grid=null, myColor=null, turn=null, sel=null, vS=[], vK=[], mode='online', oppName='', roomId='', myName='';

function ctype(c,r){
  if(c===5&&r===5) return 'oasis';
  if(GRASS.has(`${c},${r}`)) return 'grass';
  return 'desert';
}

function goOnline(){
  myName=(document.getElementById('name-input').value.trim()||'플레이어').slice(0,14);
  mode='online'; show('s-wait');
  socket.emit('join',{name:myName});
}
function goLocal(){
  myName=(document.getElementById('name-input').value.trim()||'플레이어').slice(0,14);
  mode='local'; myColor='black'; turn='black';
  const g=Array.from({length:11},()=>Array(11).fill(null));
  const BS=[[0,0],[0,1],[0,2],[1,0],[2,0],[8,10],[9,10],[10,8],[10,9],[10,10]];
  const WS=[[8,0],[9,0],[10,0],[10,1],[10,2],[0,8],[0,9],[0,10],[1,10],[2,10]];
  BS.forEach(([c,r])=>g[c][r]='black'); WS.forEach(([c,r])=>g[c][r]='white');
  grid=g; show('s-game'); render();
}
function cancelWait(){socket.emit('cancel');show('s-menu');}

function getSlides(c,r){
  const out=[];
  for(const[dc,dr]of[[0,-1],[0,1],[-1,0],[1,0]]){
    let nc=c+dc,nr=r+dr,lc=null,lr=null;
    while(nc>=0&&nc<11&&nr>=0&&nr<11&&!grid[nc][nr]){lc=nc;lr=nr;nc+=dc;nr+=dr;}
    if(lc!==null) out.push([lc,lr]);
  }
  return out;
}
function getKnights(c,r){
  return[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]
    .map(([dc,dr])=>[c+dc,r+dr])
    .filter(([nc,nr])=>nc>=0&&nc<11&&nr>=0&&nr<11&&!grid[nc][nr]&&ctype(nc,nr)==='desert');
}

function render(){
  const el=document.getElementById('board'); el.innerHTML='';
  const sSet=new Set(vS.map(([a,b])=>`${a},${b}`));
  const kSet=new Set(vK.map(([a,b])=>`${a},${b}`));
  const selKey=sel?`${sel[0]},${sel[1]}`:null;
  const myTurn=mode==='online'?(myColor===turn):true;
  const mkLbl=v=>{const d=document.createElement('div');d.className='lbl';d.textContent=v;return d;};
  el.appendChild(mkLbl(''));
  for(let c=0;c<11;c++) el.appendChild(mkLbl(ALPHA[c]));
  for(let r=0;r<11;r++){
    el.appendChild(mkLbl(r+1));
    for(let c=0;c<11;c++){
      const ct=ctype(c,r);
      const key=`${c},${r}`;
      const piece=grid[c][r];
      const isSlide=sSet.has(key), isJump=kSet.has(key), isSel=(key===selKey);
      const d=document.createElement('div');
      d.className='cell cell-'+ct+(isSel?' cell-selected':'')+(isSlide?' cell-move':'')+(isJump?' cell-jump':'');
      if(piece){
        d.textContent=piece==='black'?'♟':'♙';
        d.classList.add(piece==='black'?'piece-b':'piece-w');
      }
      d.onclick=()=>{
        if(!grid||turn==='done') return;
        if(!myTurn&&mode==='online') return;
        const color=mode==='online'?myColor:turn;
        if(piece&&piece===color){
          sel=[c,r];
          vS=getSlides(grid,c,r); vK=getKnights(grid,c,r);
          render(); return;
        }
        if(sel&&(isSlide||isJump)){
          const[fc,fr]=sel;
          if(mode==='online'){
            socket.emit('move',{roomId,fc,fr,tc:c,tr:r});
          } else {
            grid[c][r]=grid[fc][fr]; grid[fc][fr]=null;
            if(c===5&&r===5){turn='done';showWin(turn==='done'?`${grid[5][5]==='black'?'흑':'백'} 승리!`:'게임 종료','오아시스 점령!');render();return;}
            turn=turn==='black'?'white':'black';
          }
          sel=null; vS=[]; vK=[]; render(); return;
        }
        sel=null; vS=[]; vK=[]; render();
      };
      el.appendChild(d);
    }
  }
  const bt=document.getElementById('badge-turn');
  if(bt) bt.textContent=(turn==='black'?'♟ 흑':'♙ 백')+' 차례';
}

function showWin(title,desc){
  document.getElementById('win-title').textContent=title;
  document.getElementById('win-desc').textContent=desc;
  document.getElementById('win-overlay').style.display='flex';
}

// 말달리자 socket events
socket.on('waiting',()=>show('s-wait'));
socket.on('matched',({roomId:rid,myColor:mc,oppName:on,state:st})=>{
  roomId=rid; myColor=mc; oppName=on; grid=st.grid; turn=st.turn;
  sel=null; vS=[]; vK=[]; show('s-game');
  document.getElementById('online-hdr').style.display='flex';
  document.getElementById('opp-name-lbl').textContent='상대: '+on;
  document.getElementById('timer-bar').style.display='flex';
  document.getElementById('badge-you').textContent=(mc==='black'?'♟ 흑 (나)':'♙ 백 (나)');
  document.getElementById('badge-opp').textContent=(mc==='black'?'♙ 백':'♟ 흑')+' ('+on+')';
  render();
});
socket.on('state',st=>{grid=st.grid;turn=st.turn;sel=null;vS=[];vK=[];render();});
socket.on('tick',t=>{
  const el=document.getElementById('timer-num'); if(el) el.textContent=t;
  const fill=document.getElementById('timer-fill'); if(fill) fill.style.width=(t/60*100)+'%';
  if(t<=10&&fill) fill.style.background='linear-gradient(90deg,#ef4444,#b91c1c)';
});
socket.on('winner',({color,name})=>{
  const isMe=mode==='online'?(color===myColor):true;
  showWin(isMe?'🏆 승리!':'💀 패배',`${name}이(가) 오아시스 점령!`);
});
socket.on('opp_left',()=>showWin('🏆 승리!','상대방이 나갔습니다'));

// ═══════════════════════════════════════════════════════════
// BANG! GAME
// ═══════════════════════════════════════════════════════════
let bangRoomId=null, bangMyId=socket.id, bangState=null, bangSelectedCard=null, bangPendingTarget=false;

// ── Lobby ─────────────────────────────────────────────────
function bangJoin(){
  const name=(document.getElementById('bang-name-input').value.trim()||'플레이어').slice(0,14);
  socket.emit('bang_join',{name});
}
function bangHostStart(){
  socket.emit('bang_host_start');
}
function bangLeaveLobby(){
  socket.emit('bang_leave_lobby');
  bangRoomId=null;
  show('s-select');
}

socket.on('bang_joined',({roomId})=>{bangRoomId=roomId;});
socket.on('bang_lobby',({players,hostSid,minPlayers,maxPlayers})=>{
  const el=document.getElementById('bang-lobby-players');
  el.innerHTML='';
  players.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='lobby-player';
    div.innerHTML=`<span class="lp-num">${i+1}</span><span>${p.name}</span>${p.sid===hostSid?'<span class="lp-host">방장</span>':''}`;
    el.appendChild(div);
  });
  document.getElementById('bang-lobby-count').textContent=`${players.length} / ${maxPlayers}명 (최소 ${minPlayers}명)`;
  const startBtn=document.getElementById('bang-start-btn');
  if(players[0]?.sid===socket.id){
    startBtn.style.display='block';
    startBtn.disabled=players.length<minPlayers;
    startBtn.style.opacity=players.length<minPlayers?'0.5':'1';
    startBtn.textContent=`🎮 게임 시작 (${players.length}명 / 최소 ${minPlayers}명)`;
  } else {
    startBtn.style.display='none';
  }
});
socket.on('bang_err',msg=>{
  const el=document.getElementById('bg-err');
  if(el){el.textContent=msg;setTimeout(()=>el.textContent='',3000);}
});

// ── Game start ────────────────────────────────────────────
socket.on('bang_game_start',({roomId})=>{
  bangRoomId=roomId;
  bangMyId=socket.id;
  bangSelectedCard=null;
  bangPendingTarget=false;
  show('s-bang-game');
});

socket.on('bang_state',state=>{
  bangState=state;
  bangMyId=socket.id;
  bangRenderState(state);
});

// ── Game over ─────────────────────────────────────────────
socket.on('bang_game_over',({winner,reason,roles})=>{
  const icons={sheriff:'⭐',deputy:'💙',outlaw:'💀',renegade:'🃏'};
  const colors={sheriff:'#fde047',deputy:'#93c5fd',outlaw:'#fca5a5',renegade:'#d8b4fe'};
  const winnerIcon={sheriff:'⭐',outlaw:'🔫',renegade:'🎭'}[winner]||'🏆';
  document.getElementById('bg-go-icon').textContent=winnerIcon;
  document.getElementById('bg-go-title').textContent=reason;
  const rolesEl=document.getElementById('bg-go-roles');
  rolesEl.innerHTML='';
  roles.forEach(p=>{
    const div=document.createElement('div');
    div.style.cssText=`background:rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px;`;
    div.innerHTML=`<div style="font-size:1.5rem">${icons[p.role]||'?'}</div><div style="font-size:.85rem;font-weight:700">${p.name}</div><div style="font-size:.75rem;color:${colors[p.role]||'#9ca3af'}">${roleKrC(p.role)}</div>`;
    rolesEl.appendChild(div);
  });
  document.getElementById('bg-gameover').style.display='flex';
});

// ── Card builder ──────────────────────────────────────────
function buildCardHTML(card){
  const cv=card.value||'';
  const cs=card.suit||'';
  const name=CARD_NAME[card.type]||card.type;
  const img=CARD_IMG[card.type];
  const corner=`<div class="card-corner card-tl"><span class="cv">${cv}</span><span class="cs">${cs}</span></div>`;
  const cornerBr=`<div class="card-corner card-br"><span class="cv">${cv}</span><span class="cs">${cs}</span></div>`;
  if(img){
    return `${corner}<img class="card-img" src="${img}" alt="${name}"><div class="card-overlay"></div><div class="card-shine"></div><div class="card-foot">${name}</div>${cornerBr}`;
  }
  // Fallback (missed, stagecoach)
  return `${corner}<div class="card-fallback"><span class="fi">${CARD_ICON[card.type]||'🃟'}</span><span class="fn">${name}</span></div>${cornerBr}`;
}

// ── Card helpers ──────────────────────────────────────────
const CARD_ICON={bang:'🔫',missed:'🤚',beer:'🍺',stagecoach:'🚌',wells_fargo:'🏦',
  indians:'🏹',duel:'⚔️',gatling:'💥',saloon:'🍻',barrel:'🛡️',dynamite:'💣',
  jail:'🔒',volcanic:'🌋',schofield:'🔫',remington:'🔫',rev_carabiner:'🔫',
  winchester:'🔫',scope:'🔭',mustang:'🐴'};
const CARD_IMG={
  bang:'images/bang.png', missed:'images/missed.png',
  beer:'images/beer.png', stagecoach:'images/stagecoach.png', wells_fargo:'images/wells_fargo.png',
  indians:'images/indians.png', duel:'images/duel.png', gatling:'images/gatling.png',
  saloon:'images/saloon.png', barrel:'images/barrel.png', dynamite:'images/dynamite.png',
  jail:'images/jail.png', volcanic:'images/volcanic.png', schofield:'images/schofield.png',
  remington:'images/remington.png', rev_carabiner:'images/rev_carabine.png',
  winchester:'images/winchester.png', scope:'images/scope.png', mustang:'images/mustang.png',
};
const CARD_NAME={bang:'BANG!',missed:'MISSED!',beer:'맥주',stagecoach:'역마차',wells_fargo:'웰스파고',
  indians:'인디언',duel:'결투',gatling:'개틀링',saloon:'살롱',barrel:'통(배럴)',
  dynamite:'다이너마이트',jail:'감옥',volcanic:'볼카닉',schofield:'스코필드',
  remington:'레밍턴',rev_carabiner:'리볼버 카빈',winchester:'윈체스터',
  scope:'조준경',mustang:'무스탕'};
const CARD_CLASS={bang:'ct-bang',missed:'ct-missed',beer:'ct-beer',
  stagecoach:'ct-draw',wells_fargo:'ct-draw',indians:'ct-area',gatling:'ct-area',
  duel:'ct-duel',saloon:'ct-saloon',barrel:'ct-equip',dynamite:'ct-equip',
  jail:'ct-equip',scope:'ct-equip',mustang:'ct-equip',
  volcanic:'ct-weapon',schofield:'ct-weapon',remington:'ct-weapon',
  rev_carabiner:'ct-weapon',winchester:'ct-weapon'};

function roleKrC(r){return{sheriff:'보안관',deputy:'부관',outlaw:'무법자',renegade:'불한당'}[r]||r;}
function roleIcon(r){return{sheriff:'⭐',deputy:'💙',outlaw:'💀',renegade:'🎭','?':'❓'}[r]||'❓';}
function roleClass(r){return{sheriff:'role-sheriff',deputy:'role-deputy',outlaw:'role-outlaw',renegade:'role-renegade','?':'role-hidden'}[r]||'role-hidden';}

function needsTarget(type){return['bang','jail','duel'].includes(type);}
function isEquip(type){return['barrel','dynamite','mustang','scope','volcanic','schofield','remington','rev_carabiner','winchester'].includes(type);}
function isGlobal(type){return['indians','gatling','saloon','stagecoach','wells_fargo'].includes(type);}

// ── Main render ───────────────────────────────────────────
function bangRenderState(s){
  if(!s) return;
  const myIdx=s.players.findIndex(p=>p.sid===bangMyId);
  const me=myIdx>=0?s.players[myIdx]:null;
  const currentPlayer=s.players[s.turnIdx];
  const isMyTurn=currentPlayer?.sid===bangMyId;
  const pending=s.pending;

  // Phase badge
  const phaseText={start:'시작',play:'플레이',discard:'버리기','?':'대기'};
  const phaseEl=document.getElementById('bg-phase');
  phaseEl.textContent=phaseText[s.phase]||s.phase;

  // Turn name
  document.getElementById('bg-turn-name').textContent=currentPlayer?`${currentPlayer.name}의 턴`:'';

  // Players
  const playersEl=document.getElementById('bg-players');
  playersEl.innerHTML='';
  s.players.forEach((p,i)=>{
    const isMe=p.sid===bangMyId;
    const isTurn=i===s.turnIdx;
    const isPending=pending&&(pending.targetSid===p.sid||(pending.pendingSids||[]).includes(p.sid)||pending.duelCurrentSid===p.sid);
    const isTarget=bangSelectedCard&&needsTarget(bangSelectedCard.type)&&!isMe&&p.alive&&!pending;

    const div=document.createElement('div');
    div.className='bg-player'+(isMe?' is-me':'')+(isTurn?' is-turn':'')+(p.alive?'':' is-dead')+(isPending?' pending-action':'')+(isTarget?' is-target':'');
    if(isTarget) div.onclick=()=>bangPlayCard(p.sid);

    // HP hearts
    let hearts='';
    for(let h=0;h<p.maxHp;h++) hearts+=`<span class="${h<p.hp?'hp-heart':'hp-empty'}">❤️</span>`;

    // Equipment
    let equipHtml='';
    (p.equip||[]).forEach(e=>{ equipHtml+=`<span class="equip-tag">${CARD_ICON[e.type]||''} ${CARD_NAME[e.type]||e.type}</span>`; });

    div.innerHTML=`
      <div class="pname">${isMe?'👤 ':''} ${p.name}</div>
      <span class="prole ${roleClass(p.role)}">${roleIcon(p.role)} ${roleKrC(p.role)}</span>
      <div class="php">${hearts}</div>
      ${equipHtml?`<div class="pequip">${equipHtml}</div>`:''}
      <div class="phand-count">🃏 ${p.handCount}장${isTurn?' ← 현재 턴':''}</div>
    `;
    playersEl.appendChild(div);
  });

  // Deck + Discard
  document.getElementById('bg-deck-count').textContent=s.deckCount+'장';
  const dt=s.discardTop;
  const discardEl=document.getElementById('bg-discard');
  if(dt){
    discardEl.className=`bg-discard bg-card ${CARD_CLASS[dt.type]||''}`;
    discardEl.innerHTML=buildCardHTML(dt);
  } else {
    discardEl.className='bg-discard';
    discardEl.innerHTML=`<span style="font-size:1.4rem">🃟</span><span style="font-size:.6rem;color:#6b7280">버린 카드</span>`;
  }

  // Log
  const logEl=document.getElementById('bg-log');
  logEl.innerHTML=(s.log||[]).map(l=>`<p>${l}</p>`).join('');
  logEl.scrollTop=logEl.scrollHeight;

  // Pending banner + buttons
  const pendEl=document.getElementById('bg-pending');
  const passBtnEl=document.getElementById('bg-pass-btn');
  const dmgBtnEl=document.getElementById('bg-take-dmg-btn');
  const duelPassEl=document.getElementById('bg-duel-pass-btn');
  [passBtnEl,dmgBtnEl,duelPassEl].forEach(b=>{if(b)b.style.display='none';});

  if(pending){
    const amResponding=pending.targetSid===bangMyId||
      (pending.pendingSids||[]).includes(bangMyId)||
      pending.duelCurrentSid===bangMyId;
    if(amResponding){
      if(pending.type==='bang'){
        pendEl.style.display='block';
        pendEl.innerHTML='⚠️ BANG! 맞았습니다! MISSED! 카드로 막거나 피해를 입으세요.';
        if(dmgBtnEl) dmgBtnEl.style.display='inline-block';
      } else if(pending.type==='indians'){
        pendEl.style.display='block';
        pendEl.innerHTML='🏹 인디언! BANG! 카드로 막거나 피해를 입으세요.';
        if(dmgBtnEl) dmgBtnEl.style.display='inline-block';
      } else if(pending.type==='duel'){
        pendEl.style.display='block';
        pendEl.innerHTML='⚔️ 결투! BANG! 카드로 응수하거나 항복하세요.';
        if(duelPassEl) duelPassEl.style.display='inline-block';
      }
    } else {
      pendEl.style.display='block';
      const who=pending.duelCurrentSid?s.players.find(p=>p.sid===pending.duelCurrentSid)?.name:
                pending.targetSid?s.players.find(p=>p.sid===pending.targetSid)?.name:'누군가';
      pendEl.innerHTML=`⏳ ${who}의 응답 대기 중...`;
    }
  } else {
    pendEl.style.display='none';
  }

  // End turn button
  const endTurnBtn=document.getElementById('bg-end-turn-btn');
  if(endTurnBtn){
    endTurnBtn.style.display=(isMyTurn&&s.phase==='play'&&!pending)?'inline-block':'none';
  }

  // Hand
  const handEl=document.getElementById('bg-hand-cards');
  handEl.innerHTML='';
  if(me?.hand){
    const isDiscard=isMyTurn&&s.phase==='discard';
    const isResponding=pending&&(pending.targetSid===bangMyId||(pending.pendingSids||[]).includes(bangMyId)||pending.duelCurrentSid===bangMyId);
    const canPlay=(!pending&&isMyTurn&&s.phase==='play')||isResponding;

    me.hand.forEach(card=>{
      const isSelected=bangSelectedCard?.id===card.id;
      const isDisabled=!canPlay&&!isDiscard;

      // For response, only certain cards are playable
      let isResponseCard=false;
      if(isResponding){
        if(pending.type==='bang'||pending.type==='indians') isResponseCard=card.type==='missed'||(card.type==='beer'&&me.hp===1);
        else if(pending.type==='duel') isResponseCard=card.type==='bang';
      }
      const cardDisabled=isDiscard?false:(isResponding?!isResponseCard:isDisabled);

      const div=document.createElement('div');
      div.className=`bg-card ${CARD_CLASS[card.type]||''}${isSelected?' selected':''}${cardDisabled?' disabled':''}`;
      div.innerHTML=buildCardHTML(card);

      if(!cardDisabled){
        div.onclick=()=>{
          if(isDiscard){
            bangDiscardCard(card.id); return;
          }
          if(isResponding){
            bangRespond(card.id); return;
          }
          // Normal play
          if(needsTarget(card.type)){
            bangSelectedCard=isSelected?null:card;
            document.getElementById('bg-selected-info').textContent=bangSelectedCard?`"${CARD_NAME[card.type]}" 선택됨 → 대상 플레이어 클릭`:'';
            bangRenderState(bangState);
          } else if(isEquip(card.type)||isGlobal(card.type)){
            bangSelectedCard=null;
            document.getElementById('bg-selected-info').textContent='';
            bangPlayCard(null,card.id);
          } else {
            bangSelectedCard=null;
            document.getElementById('bg-selected-info').textContent='';
            bangPlayCard(null,card.id);
          }
        };
      }
      handEl.appendChild(div);
    });

    document.getElementById('bg-hand-count').textContent=me.hand.length+'장';

    // Discard hint
    if(isMyTurn&&s.phase==='discard'){
      const excess=me.hand.length-me.hp;
      const hint=document.createElement('div');
      hint.style.cssText='width:100%;color:#fca5a5;font-size:.8rem;margin-top:4px;';
      hint.textContent=`카드를 ${excess}장 버려야 합니다 (HP: ${me.hp})`;
      handEl.appendChild(hint);
    }
  }
}

// ── Actions ───────────────────────────────────────────────
function bangPlayCard(targetSid, overrideCardId){
  if(!bangRoomId) return;
  const cardId=overrideCardId!=null?overrideCardId:(bangSelectedCard?.id);
  if(cardId==null) return;
  socket.emit('bang_play',{roomId:bangRoomId, cardId, targetSid:targetSid||undefined});
  bangSelectedCard=null;
  document.getElementById('bg-selected-info').textContent='';
}

function bangRespond(cardId){
  if(!bangRoomId) return;
  socket.emit('bang_respond',{roomId:bangRoomId, cardId:cardId||null});
}

function bangEndTurn(){
  if(!bangRoomId) return;
  bangSelectedCard=null;
  socket.emit('bang_end_turn',{roomId:bangRoomId});
}

function bangDiscardCard(cardId){
  if(!bangRoomId) return;
  socket.emit('bang_discard',{roomId:bangRoomId, cardId});
}
</script>
</body>
</html>
