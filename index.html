<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐎 말달리자</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px 40px;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      color: #ffd700;
      text-shadow: 0 0 28px rgba(255,215,0,.55);
      letter-spacing: .18em;
      margin-bottom: 4px;
    }
    .sub {
      font-size: .85rem;
      color: #7a9cc0;
      margin-bottom: 18px;
      letter-spacing: .05em;
    }

    /* ── Status bar ─────────────────────────────────── */
    .status {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 50px;
      padding: 11px 26px;
      margin-bottom: 18px;
    }
    .turn-info {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 1rem;
      font-weight: 700;
    }
    .chip {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2.5px solid;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: background .3s, border-color .3s;
    }
    .chip.black { background: #111; border-color: #777; color: #bbb; }
    .chip.white { background: #eee; border-color: #aaa; color: #555; }

    .timer-wrap { display: flex; align-items: center; gap: 9px; }
    .timer-track {
      width: 96px; height: 7px;
      background: rgba(255,255,255,.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: #38bdf8;
      border-radius: 4px;
      transition: width 1s linear, background .3s;
    }
    .timer-fill.red { background: #f87171; }
    .timer-num {
      font-size: 1.3rem;
      font-weight: 700;
      color: #38bdf8;
      min-width: 44px;
      transition: color .3s;
    }
    .timer-num.red { color: #f87171; animation: blink .5s ease infinite alternate; }
    @keyframes blink { to { opacity: .25; } }

    /* ── Board ──────────────────────────────────────── */
    .board-outer {
      display: grid;
      grid-template-columns: 22px repeat(11, 50px);
      grid-template-rows: 22px repeat(11, 50px);
      gap: 3px;
      background: #5c4422;
      padding: 3px;
      border: 3px solid #7a5c30;
      border-radius: 9px;
      box-shadow: 0 10px 40px rgba(0,0,0,.55);
    }

    .lbl {
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #c8a060;
    }

    .cell {
      width: 50px; height: 50px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      position: relative;
      transition: filter .12s, outline .08s;
    }
    .cell:hover { filter: brightness(1.18); }

    .cell.desert  { background: #c89a48; }
    .cell.grass   { background: #4a9440; }
    .cell.oasis   {
      background: radial-gradient(circle, #3dbf8a 0%, #1c7d58 55%, #0e5e40 100%);
      box-shadow: inset 0 0 12px rgba(61,191,138,.45);
    }

    /* Valid move highlights */
    .cell.vs { outline: 3px solid #22d3ee; outline-offset: -3px; animation: vp .85s ease-in-out infinite alternate; }
    .cell.vk { outline: 3px solid #c084fc; outline-offset: -3px; animation: vp .85s ease-in-out infinite alternate; }
    .cell.sel { outline: 3px solid #f97316; outline-offset: -3px; }
    .cell.pend { outline: 3px solid #facc15; outline-offset: -3px; }
    @keyframes vp { to { filter: brightness(1.32); } }

    .oasis-mark {
      position: absolute;
      font-size: 24px;
      opacity: .65;
      pointer-events: none;
    }

    /* ── Pieces ─────────────────────────────────────── */
    .piece {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      pointer-events: none;
      box-shadow: 0 3px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.22);
      transition: transform .1s;
    }
    .cell:hover .piece,
    .cell.sel .piece { transform: scale(1.12); }
    .piece.black {
      background: radial-gradient(circle at 34% 34%, #666, #111);
      border-color: #888; color: #ccc;
    }
    .piece.white {
      background: radial-gradient(circle at 34% 34%, #fff, #ccc);
      border-color: #aaa; color: #666;
    }

    /* ── Legend ─────────────────────────────────────── */
    .legend {
      display: flex; gap: 18px; flex-wrap: wrap;
      justify-content: center;
      margin-top: 14px;
    }
    .lg { display: flex; align-items: center; gap: 6px; font-size: .78rem; color: #9ab; }
    .lg-box { width: 15px; height: 15px; border-radius: 3px; flex-shrink: 0; }

    /* ── Dialogs ────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.68);
      display: flex; align-items: center; justify-content: center;
      z-index: 80;
      backdrop-filter: blur(5px);
    }
    .dlg {
      background: linear-gradient(140deg, #1e2e4c, #2a1e4c);
      border: 2px solid #ffd700;
      border-radius: 18px;
      padding: 34px 46px;
      text-align: center;
      box-shadow: 0 0 48px rgba(255,215,0,.2), 0 24px 48px rgba(0,0,0,.5);
      max-width: 92vw;
    }
    .dlg h3 { font-size: 1.25rem; margin-bottom: 8px; color: #fff; }
    .dlg p  { color: #aac; margin-bottom: 24px; line-height: 1.6; font-size: .97rem; }
    .dlg p b { color: #fff; }
    .btn-row { display: flex; gap: 14px; justify-content: center; }
    .btn {
      padding: 11px 30px;
      border: none; border-radius: 9px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.35); }
    .btn:active { transform: none; }
    .btn-yes { background: #22c55e; color: #fff; }
    .btn-no  { background: #ef4444; color: #fff; }
    .btn-rst { background: linear-gradient(135deg, #ffd700, #f97316); color: #111; }

    /* Win dialog */
    .win-dlg { animation: pop .42s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes pop { from { transform:scale(.4); opacity:0; } to { transform:scale(1); opacity:1; } }
    .win-dlg h2 {
      font-size: 2.1rem; color: #ffd700;
      text-shadow: 0 0 24px rgba(255,215,0,.7);
      margin-bottom: 10px;
    }

    /* ── Scroll on small screens ────────────────────── */
    @media (max-width: 680px) {
      .board-outer {
        grid-template-columns: 18px repeat(11, 42px);
        grid-template-rows: 18px repeat(11, 42px);
      }
      .cell { width: 42px; height: 42px; }
      .piece { width: 34px; height: 34px; font-size: 18px; }
      .oasis-mark { font-size: 20px; }
    }
  </style>
</head>
<body>
  <h1>🐎 말달리자</h1>
  <p class="sub">오아시스에 먼저 도달하는 플레이어가 승리합니다</p>

  <div class="status">
    <div class="turn-info">
      <div class="chip black" id="turn-chip">♞</div>
      <span id="turn-text">흑의 차례</span>
    </div>
    <div class="timer-wrap">
      <div class="timer-track"><div class="timer-fill" id="tfill" style="width:100%"></div></div>
      <div class="timer-num" id="tnum">1:00</div>
    </div>
  </div>

  <div class="board-outer" id="board"></div>

  <div class="legend">
    <div class="lg"><div class="lg-box" style="background:#c89a48"></div>사막</div>
    <div class="lg"><div class="lg-box" style="background:#4a9440"></div>초원</div>
    <div class="lg"><div class="lg-box" style="background:#1c7d58"></div>오아시스</div>
    <div class="lg"><div class="lg-box" style="border:2.5px solid #22d3ee;background:rgba(34,211,238,.12)"></div>슬라이드 이동</div>
    <div class="lg"><div class="lg-box" style="border:2.5px solid #c084fc;background:rgba(192,132,252,.12)"></div>L자 이동</div>
  </div>

  <!-- Confirm dialog -->
  <div class="overlay" id="conf-overlay" style="display:none">
    <div class="dlg">
      <h3>이동 확인</h3>
      <p id="conf-msg"></p>
      <div class="btn-row">
        <button class="btn btn-yes" id="btn-yes">네, 이동합니다</button>
        <button class="btn btn-no"  id="btn-no">아니오</button>
      </div>
    </div>
  </div>

  <!-- Win dialog -->
  <div class="overlay" id="win-overlay" style="display:none">
    <div class="dlg win-dlg">
      <h2 id="win-title"></h2>
      <p>오아시스에 먼저 도달했습니다! 🌴</p>
      <button class="btn btn-rst" id="btn-rst">다시 시작 🔄</button>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────
    const C = 11, R = 11;
    const ALPHA = 'abcdefghijk';

    // 0-indexed: col = letter index (a=0..k=10), row = number-1 (1→0, 11→10)
    const OC = 5, OR = 5; // Oasis: f6

    const GRASS = new Set([
      '3,5','4,4','4,5','4,6',
      '5,3','5,4','5,6','5,7',
      '6,4','6,5','6,6',
      '7,5'
    ]);

    // Black: a1,a2,a3,b1,c1 (top-left) + i11,j11,k9,k10,k11 (bottom-right)
    const BLACK_START = [
      [0,0],[0,1],[0,2],[1,0],[2,0],
      [8,10],[9,10],[10,8],[10,9],[10,10]
    ];
    // White: opposite corners (top-right + bottom-left)
    const WHITE_START = [
      [8,0],[9,0],[10,0],[10,1],[10,2],
      [0,8],[0,9],[0,10],[1,10],[2,10]
    ];

    // ── State ──────────────────────────────────────────────────
    let grid;          // grid[col][row] = 'black'|'white'|null
    let turn;          // 'black'|'white'
    let selPos;        // [col,row] or null
    let vS;            // valid slide destinations [[col,row],…]
    let vK;            // valid knight destinations
    let pendDest;      // [col,row] or null
    let pendType;      // 'slide'|'knight'
    let tLeft;         // seconds left
    let tId;           // interval id
    let done;          // game over flag

    // ── Cell type ──────────────────────────────────────────────
    function ctype(c, r) {
      if (c === OC && r === OR) return 'oasis';
      if (GRASS.has(`${c},${r}`)) return 'grass';
      return 'desert';
    }

    // ── Move generation ────────────────────────────────────────
    function getSlides(c, r) {
      const out = [];
      for (const [dc, dr] of [[0,-1],[0,1],[-1,0],[1,0]]) {
        let nc = c+dc, nr = r+dr;
        while (nc>=0 && nc<C && nr>=0 && nr<R && !grid[nc][nr]) {
          out.push([nc, nr]);
          nc += dc; nr += dr;
        }
      }
      return out;
    }

    // Knight = chess knight; destination must be empty desert
    function getKnights(c, r) {
      return [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]
        .map(([dc,dr]) => [c+dc, r+dr])
        .filter(([nc,nr]) =>
          nc>=0 && nc<C && nr>=0 && nr<R &&
          !grid[nc][nr] &&
          ctype(nc, nr) === 'desert'
        );
    }

    // ── Render ─────────────────────────────────────────────────
    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';

      const sSet = new Set(vS.map(([a,b])=>`${a},${b}`));
      const kSet = new Set(vK.map(([a,b])=>`${a},${b}`));
      const selKey  = selPos   ? `${selPos[0]},${selPos[1]}`   : null;
      const pendKey = pendDest ? `${pendDest[0]},${pendDest[1]}` : null;

      // Row 0: corner + column labels (a–k)
      el.appendChild(mkLbl(''));
      for (let c=0; c<C; c++) el.appendChild(mkLbl(ALPHA[c]));

      // Rows 1–11: row label + cells
      for (let r=0; r<R; r++) {
        el.appendChild(mkLbl(r+1));
        for (let c=0; c<C; c++) {
          const key  = `${c},${r}`;
          const type = ctype(c, r);
          const cell = document.createElement('div');
          cell.className = 'cell ' + type;

          if      (key === selKey)   cell.classList.add('sel');
          else if (key === pendKey)  cell.classList.add('pend');
          else if (sSet.has(key))    cell.classList.add('vs');
          else if (kSet.has(key))    cell.classList.add('vk');

          if (type === 'oasis' && !grid[c][r]) {
            const m = document.createElement('div');
            m.className = 'oasis-mark'; m.textContent = '🌴';
            cell.appendChild(m);
          }
          if (grid[c][r]) {
            const p = document.createElement('div');
            p.className = 'piece ' + grid[c][r];
            p.textContent = grid[c][r] === 'black' ? '♞' : '♘';
            cell.appendChild(p);
          }
          cell.addEventListener('click', () => onCell(c, r));
          el.appendChild(cell);
        }
      }
    }

    function mkLbl(txt) {
      const d = document.createElement('div');
      d.className = 'lbl'; d.textContent = txt; return d;
    }

    // ── Interaction ────────────────────────────────────────────
    function onCell(c, r) {
      if (done || pendDest !== null) return;
      const key  = `${c},${r}`;
      const sSet = new Set(vS.map(([a,b])=>`${a},${b}`));
      const kSet = new Set(vK.map(([a,b])=>`${a},${b}`));

      // Click on a valid destination → show confirm
      if (sSet.has(key) || kSet.has(key)) {
        pendDest = [c, r];
        pendType = sSet.has(key) ? 'slide' : 'knight';
        const cLbl = ALPHA[c];
        const rLbl = r + 1;
        const typeKor = pendType === 'slide' ? '슬라이드' : 'L자';
        document.getElementById('conf-msg').innerHTML =
          `<b>${cLbl}${rLbl}</b> 칸으로 <b>${typeKor} 이동</b>하겠습니까?`;
        document.getElementById('conf-overlay').style.display = 'flex';
        render();
        return;
      }

      // Click on own piece → select it
      if (grid[c][r] === turn) {
        selPos = [c, r];
        vS = getSlides(c, r);
        vK = getKnights(c, r);
        render();
        return;
      }

      // Anywhere else → deselect
      selPos = null; vS = []; vK = [];
      render();
    }

    // Confirm: yes
    document.getElementById('btn-yes').addEventListener('click', () => {
      document.getElementById('conf-overlay').style.display = 'none';
      if (!pendDest || !selPos) { pendDest = null; return; }

      const [fc, fr] = selPos;
      const [tc, tr] = pendDest;
      const mover = grid[fc][fr];
      grid[tc][tr] = mover;
      grid[fc][fr] = null;

      selPos = null; vS = []; vK = []; pendDest = null;
      render();

      // Check win
      if (tc === OC && tr === OR) {
        done = true;
        clearInterval(tId);
        setTimeout(() => showWin(mover), 350);
        return;
      }

      turn = turn === 'black' ? 'white' : 'black';
      updateStatus();
      resetTimer();
    });

    // Confirm: no
    document.getElementById('btn-no').addEventListener('click', () => {
      document.getElementById('conf-overlay').style.display = 'none';
      pendDest = null;
      render();
    });

    // ── Timer ──────────────────────────────────────────────────
    function startTimer() {
      tLeft = 60;
      clearInterval(tId);
      tId = setInterval(tick, 1000);
      drawTimer();
    }

    function resetTimer() { startTimer(); }

    function tick() {
      if (done) { clearInterval(tId); return; }
      tLeft--;
      drawTimer();
      if (tLeft <= 0) passTurn();
    }

    function drawTimer() {
      const num  = document.getElementById('tnum');
      const fill = document.getElementById('tfill');
      const m = Math.floor(tLeft / 60);
      const s = tLeft % 60;
      num.textContent = `${m}:${s.toString().padStart(2,'0')}`;
      const urgent = tLeft <= 10;
      num.classList.toggle('red', urgent);
      fill.classList.toggle('red', urgent);
      fill.style.width = (tLeft / 60 * 100) + '%';
    }

    function passTurn() {
      if (done) return;
      // Close any open dialogs
      document.getElementById('conf-overlay').style.display = 'none';
      selPos = null; vS = []; vK = []; pendDest = null;
      turn = turn === 'black' ? 'white' : 'black';
      render(); updateStatus(); resetTimer();
    }

    // ── Status bar ────────────────────────────────────────────
    function updateStatus() {
      const chip = document.getElementById('turn-chip');
      const txt  = document.getElementById('turn-text');
      chip.className = 'chip ' + turn;
      chip.textContent = turn === 'black' ? '♞' : '♘';
      txt.textContent = (turn === 'black' ? '흑' : '백') + '의 차례';
    }

    function showWin(player) {
      const name = player === 'black' ? '흑 (♞)' : '백 (♘)';
      document.getElementById('win-title').textContent = `🎉 ${name} 승리!`;
      document.getElementById('win-overlay').style.display = 'flex';
    }

    document.getElementById('btn-rst').addEventListener('click', () => {
      document.getElementById('win-overlay').style.display = 'none';
      init();
    });

    // ── Init ──────────────────────────────────────────────────
    function init() {
      grid = Array.from({length: C}, () => Array(R).fill(null));
      for (const [c, r] of BLACK_START) grid[c][r] = 'black';
      for (const [c, r] of WHITE_START) grid[c][r] = 'white';
      turn = 'black';
      selPos = null; vS = []; vK = [];
      pendDest = null; done = false;
      updateStatus();
      render();
      startTimer();
    }

    init();
  </script>
</body>
</html>
